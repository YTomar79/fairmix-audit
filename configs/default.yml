project:
  name: protected_attribute_missingness_audit
  output_dir: results
  random_seeds: [2027, 2028, 2029, 2030, 2031]

data:
  source: folktables
  cache_dir: data/raw/folktables
  tasks: [ACSIncome, ACSEmployment, ACSPublicCoverage, ACSMobility]
  years: [2018, 2019, 2021, 2022]
  states: [ALL]
  horizon: 1-Year
  survey: person
  low_memory_reader: true
  low_memory_reader_chunksize: 50000
  label_column: label
  protected_attributes: [RAC1P, SEX]
  oracle_sensitive_attributes: [RAC1P, SEX]
  context_attributes: [__state, __year]
  max_rows_per_context: 3000
  max_train_rows_per_split: 75000
  max_test_rows_per_split: 40000

splits:
  modes: [temporal, geographic, geo_temporal]
  temporal:
    train_years: [2018, 2019, 2021]
    test_year: 2022
    rolling: true
    min_train_years: 1
  geographic:
    leave_one_state_out: true
    max_holdout_states: 50
  validation_fraction: 0.25

model:
  estimator: logistic_regression
  numeric_features: [AGEP, WKHP, PINCP, JWMNP, POVPIP]
  onehot_max_categories: 64
  max_iter: 1000
  class_weight: null

methods:
  enabled:
    - erm
    - feature_mixing
    - reweighing
    - protected_group_mixing
    - exponentiated_gradient_dp
    - exponentiated_gradient_eo
    - threshold_optimizer_eo

protected_missingness:
  mnar_minority_multiplier: 0.25
  # Reference design: one complete-label regime (full) plus ten non-full regimes
  # (an MCAR availability sweep, matched MNAR ablations, and zero observed labels).
  regimes:
    - name: full
      mechanism: mcar
      availability: 1.0
      scope: train_only
    - name: mcar_80_train_prediction
      mechanism: mcar
      availability: 0.8
      scope: train_and_prediction
    - name: mcar_60_train_prediction
      mechanism: mcar
      availability: 0.6
      scope: train_and_prediction
    - name: mcar_50_train_prediction
      mechanism: mcar
      availability: 0.5
      scope: train_and_prediction
    - name: mcar_40_train_prediction
      mechanism: mcar
      availability: 0.4
      scope: train_and_prediction
    - name: mcar_20_train_prediction
      mechanism: mcar
      availability: 0.2
      scope: train_and_prediction
    - name: mcar_10_train_prediction
      mechanism: mcar
      availability: 0.1
      scope: train_and_prediction
    - name: mnar_50_train_prediction
      mechanism: mnar
      availability: 0.5
      scope: train_and_prediction
      mnar_minority_multiplier: 0.25
    - name: mnar_20_train_prediction
      mechanism: mnar
      availability: 0.2
      scope: train_and_prediction
      mnar_minority_multiplier: 0.25
    - name: mnar_10_train_prediction
      mechanism: mnar
      availability: 0.1
      scope: train_and_prediction
      mnar_minority_multiplier: 0.25
    - name: none_observed
      mechanism: mcar
      availability: 0.0
      scope: train_and_prediction

feature_mixing:
  mix_ratio: 1.0
  beta: 0.4
  label_conditioned: true
  min_contexts_per_label: 2

fairlearn:
  eps: 0.02
  max_dense_matrix_mb: 768

metrics:
  min_group_size: 25
  positive_label: 1

statistics:
  bootstrap_iterations: 1000
  confidence_level: 0.95
  holm_alpha: 0.05
  cluster_column: cluster_id

audit:
  accuracy_improvement_tolerance: 0.002
  fairness_worsening_tolerance: 0.01
  worst_group_accuracy_drop_tolerance: 0.005
