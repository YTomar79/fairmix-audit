project:
  name: smoke_attribute_missingness_audit
  output_dir: results
  random_seeds: [2027]

data:
  source: folktables
  cache_dir: data/raw/folktables
  tasks: [ACSIncome]
  years: [2018, 2019]
  states: [CA, TX]
  horizon: 1-Year
  survey: person
  low_memory_reader: true
  low_memory_reader_chunksize: 50000
  label_column: label
  protected_attributes: [RAC1P, SEX]
  oracle_sensitive_attributes: [RAC1P, SEX]
  context_attributes: [__state, __year]
  max_rows_per_context: 750

splits:
  modes: [temporal]
  temporal:
    train_years: [2018]
    test_year: 2019
  geographic:
    leave_one_state_out: false
    max_holdout_states: 0
  validation_fraction: 0.25

model:
  estimator: logistic_regression
  numeric_features: [AGEP, WKHP]
  max_iter: 500
  class_weight: null

methods:
  enabled:
    - erm
    - feature_mixing
    - reweighing
    - protected_group_mixing
    - exponentiated_gradient_dp
    - exponentiated_gradient_eo
    - threshold_optimizer_eo

protected_missingness:
  regimes:
    - name: full
      mechanism: mcar
      availability: 1.0
      scope: train_only
    - name: mcar_50_train_prediction
      mechanism: mcar
      availability: 0.5
      scope: train_and_prediction

feature_mixing:
  mix_ratio: 0.5
  beta: 0.4
  label_conditioned: true
  min_contexts_per_label: 2

fairlearn:
  eps: 0.02

metrics:
  min_group_size: 10
  positive_label: 1

statistics:
  bootstrap_iterations: 200
  confidence_level: 0.95
  holm_alpha: 0.05
  cluster_column: cluster_id

audit:
  accuracy_improvement_tolerance: 0.002
  fairness_worsening_tolerance: 0.01
  worst_group_accuracy_drop_tolerance: 0.005
